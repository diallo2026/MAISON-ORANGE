<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Orange — Gestion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --orange:#FF6600;
    --orange-dark:#D14E00;
    --orange-deep:#7A2E00;
    --ink:#1B1B1F;
    --ink-soft:#4A4A52;
    --paper:#F7F5F2;
    --card:#FFFFFF;
    --line:#E7E3DD;
    --ok:#1F8A4C;
    --warn:#C88A00;
    --danger:#C22B2B;
    --locked:#8A8A93;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
    --disp: 'Space Grotesk', 'Inter', sans-serif;
    --side-bg: linear-gradient(180deg, #FF6600, #D14E00);
    --side-text: #FFFFFF;
    --side-text-soft: rgba(255,255,255,.75);
    --side-active-bg: rgba(0,0,0,.22);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:var(--paper);color:var(--ink);}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#DDD7CE;border-radius:6px;}

  /* ---------- LOGIN ---------- */
  #login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,102,0,.10), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(122,46,0,.10), transparent 45%),
      var(--ink);
  }
  .login-card{
    width:min(420px,92vw);background:var(--card);border-radius:4px;
    padding:40px 36px 34px;box-shadow:0 30px 60px rgba(0,0,0,.35);
    border-top:5px solid var(--orange);
  }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;background:var(--orange);
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--disp);font-weight:700;
  }
  .brand-name{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:-.01em;}
  .brand-sub{font-size:12px;color:var(--ink-soft);margin:0 0 26px;letter-spacing:.04em;text-transform:uppercase;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  .field input, .field select{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:4px;
    font-family:var(--mono);font-size:14px;background:#FCFBFA;color:var(--ink);
  }
  .field input:focus, .field select:focus{outline:none;border-color:var(--orange);background:#fff;}
  .btn{
    appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:600;
    border-radius:4px;padding:11px 18px;font-size:14px;transition:.15s;
  }
  .btn-primary{background:var(--orange);color:#fff;width:100%;margin-top:8px;}
  .btn-primary:hover{background:var(--orange-dark);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
  .btn-ghost:hover{border-color:var(--orange);color:var(--orange-dark);}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .btn-danger{background:#FBEAEA;color:var(--danger);}
  .btn-danger:hover{background:var(--danger);color:#fff;}
  .login-err{background:#FBEAEA;color:var(--danger);font-size:13px;padding:9px 12px;border-radius:4px;margin-bottom:14px;display:none;}
  .login-hint{margin-top:20px;padding-top:16px;border-top:1px dashed var(--line);font-size:11.5px;color:var(--ink-soft);line-height:1.6;}
  .login-hint b{color:var(--ink);}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100vh;grid-template-columns:230px 1fr;}
  #app.active{display:grid;}
  aside{
    background:var(--side-bg);color:var(--side-text);padding:20px 14px;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
  }
  .side-brand{display:flex;align-items:center;gap:9px;padding:6px 8px 20px;border-bottom:1px solid rgba(255,255,255,.22);margin-bottom:14px;}
  .side-brand .brand-mark{width:28px;height:28px;font-size:13px;overflow:hidden;padding:0;}
  .side-brand .brand-mark img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
  .side-brand-text{font-family:var(--disp);font-weight:700;font-size:14.5px;color:var(--side-text);}
  .side-role{font-size:10px;color:var(--side-text-soft);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}
  nav{flex:1;display:flex;flex-direction:column;gap:2px;}
  nav .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--side-text-soft);margin:14px 8px 6px;}
  nav button{
    all:unset;cursor:pointer;padding:9px 10px;border-radius:5px;font-size:13.5px;color:var(--side-text-soft);
    display:flex;align-items:center;gap:9px;transition:.12s;
  }
  nav button:hover{background:rgba(255,255,255,.14);color:var(--side-text);}
  nav button.active{background:var(--side-active-bg);color:var(--side-text);font-weight:600;}
  nav button .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6;}
  .side-user{border-top:1px solid rgba(255,255,255,.22);padding-top:12px;margin-top:8px;}
  .side-user-name{font-size:13px;font-weight:600;color:var(--side-text);}
  .side-user-code{font-size:11px;color:var(--side-text-soft);font-family:var(--mono);}
  .side-logout{margin-top:10px;width:100%;}

  main{padding:24px 30px 60px;overflow-x:hidden;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .topbar h1{font-family:var(--disp);font-size:24px;margin:0 0 4px;letter-spacing:-.01em;}
  .topbar p{margin:0;color:var(--ink-soft);font-size:13.5px;}
  .lock-banner{
    background:#FFF4E9;border:1px solid #FFD8AE;color:var(--orange-deep);
    padding:10px 14px;border-radius:5px;font-size:12.5px;margin-bottom:18px;display:flex;gap:12px;align-items:center;
  }
  .lock-banner .banner-text{flex:1;}
  .day-arc{flex-shrink:0;display:flex;align-items:center;gap:8px;}
  .day-arc svg{display:block;}
  .day-arc-label{font-family:var(--mono);font-size:10.5px;color:var(--orange-deep);white-space:nowrap;}
  .export-btn{display:inline-flex;align-items:center;gap:5px;}

  .grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:16px 18px;position:relative;overflow:hidden;}
  .stat-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--orange);}
  .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:8px;}
  .stat-value{font-family:var(--disp);font-size:28px;font-weight:700;}
  .stat-sub{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:6px;margin-bottom:20px;}
  .panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:8px;}
  .panel-head h2{font-family:var(--disp);font-size:16px;margin:0;}
  .panel-body{padding:16px 18px;}
  .panel-actions{display:flex;gap:8px;flex-wrap:wrap;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);
    padding:8px 10px;border-bottom:1.5px solid var(--line);white-space:nowrap;
  }
  td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr:hover td{background:#FBFAF8;}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;}
  .badge-ok{background:#E4F6EB;color:var(--ok);}
  .badge-warn{background:#FFF3DC;color:var(--warn);}
  .badge-danger{background:#FBEAEA;color:var(--danger);}
  .badge-locked{background:#EDEDEF;color:var(--locked);}
  .badge-orange{background:#FFE9D9;color:var(--orange-dark);}
  .mono{font-family:var(--mono);font-size:12.5px;}
  .muted{color:var(--ink-soft);}

  .empty{padding:36px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px;}
  .empty b{display:block;color:var(--ink);font-size:14.5px;margin-bottom:4px;font-family:var(--disp);}

  .modal-bg{position:fixed;inset:0;background:rgba(20,15,10,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal-bg.active{display:flex;}
  .modal{background:#fff;border-radius:6px;width:min(480px,100%);max-height:88vh;overflow-y:auto;border-top:4px solid var(--orange);}
  .modal-head{padding:18px 20px 10px;display:flex;justify-content:space-between;align-items:center;}
  .modal-head h3{font-family:var(--disp);font-size:17px;margin:0;}
  .modal-close{cursor:pointer;background:none;border:none;font-size:20px;color:var(--ink-soft);}
  .modal-body{padding:6px 20px 20px;}
  .modal-body .field{margin-bottom:14px;}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:0 20px 20px;}

  .tag-row{display:flex;gap:6px;flex-wrap:wrap;}
  .perm-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;background:#F3F1EE;padding:4px 9px;border-radius:20px;}
  .perm-chip input{margin:0;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .tab-btn{all:unset;cursor:pointer;padding:9px 14px;font-size:13px;color:var(--ink-soft);border-bottom:2px solid transparent;}
  .tab-btn.active{color:var(--orange-dark);border-bottom-color:var(--orange);font-weight:600;}

  .search-input{padding:8px 10px;border:1.5px solid var(--line);border-radius:4px;font-size:13px;min-width:200px;}
  .toast{
    position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:5px;
    font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:200;display:none;border-left:3px solid var(--orange);
  }
  .toast.active{display:block;}
  select, input[type=text], input[type=number], input[type=date], textarea{
    font-family:var(--sans);font-size:13.5px;padding:9px 10px;border:1.5px solid var(--line);border-radius:4px;width:100%;background:#FCFBFA;
  }
  select:focus, input:focus, textarea:focus{outline:none;border-color:var(--orange);background:#fff;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .hist-item{border-left:2px solid var(--orange); padding:6px 0 6px 12px; margin-bottom:6px; font-size:12.5px;}
  .hist-item .h-date{color:var(--ink-soft); font-family:var(--mono); font-size:11px;}

  /* Organigramme */
  .org-chart{display:flex;flex-direction:column;align-items:center;gap:22px;padding:10px 0 4px;}
  .org-card{
    background:#FCFBFA;border:1.5px solid var(--line);border-radius:6px;padding:10px 16px;
    cursor:pointer;transition:.12s;min-width:150px;text-align:center;
  }
  .org-card:hover{border-color:var(--orange);box-shadow:0 4px 10px rgba(255,102,0,.12);transform:translateY(-1px);}
  .org-root{background:var(--ink);color:#fff;border-color:var(--ink);cursor:default;}
  .org-root:hover{transform:none;box-shadow:none;}
  .org-root .org-role{color:#FF9E52;}
  .org-name{font-family:var(--disp);font-weight:600;font-size:13.5px;}
  .org-role{font-size:10.5px;color:var(--ink-soft);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
  .org-root .org-name{font-size:15px;}
  .org-branches{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;padding-top:20px;border-top:2px dashed var(--line);width:100%;position:relative;}
  .org-node{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;}
  .org-node::before{content:"";position:absolute;top:-20px;left:50%;width:1px;height:20px;background:var(--line);}
  .org-children{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:340px;padding-top:12px;border-top:1px dashed var(--line);}
  .org-leaf{min-width:110px;padding:8px 10px;}
  .org-leaf .org-name{font-size:12px;}
  .org-agent{background:#FFF4E9;}
  .org-empty{font-size:11.5px;color:var(--ink-soft);font-style:italic;}

  /* Objectifs & graphiques */
  .chart-wrap{position:relative;height:240px;margin-bottom:4px;}
  .progress-track{background:#EFEBE4;border-radius:20px;height:10px;overflow:hidden;margin-top:6px;}
  .progress-fill{height:100%;background:var(--orange);border-radius:20px;transition:width .3s;}
  .progress-fill.over{background:var(--ok);}
  .obj-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;margin-bottom:4px;}
  .obj-row b{font-family:var(--disp);}
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .delta-up{color:var(--ok);font-weight:600;}
  .delta-down{color:var(--danger);font-weight:600;}

  /* Cartes PDV */
  .pdv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
  .pdv-card{
    background:#FCFBFA;border:1.5px solid var(--line);border-radius:6px;padding:14px 16px;cursor:pointer;transition:.12s;
  }
  .pdv-card:hover{border-color:var(--orange);box-shadow:0 6px 16px rgba(255,102,0,.12);transform:translateY(-2px);}
  .pdv-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .pdv-card-name{font-family:var(--disp);font-weight:600;font-size:14.5px;}
  .pdv-card-lieu{font-size:11.5px;color:var(--ink-soft);margin-bottom:12px;}
  .pdv-card-stats{display:flex;justify-content:space-between;border-top:1px dashed var(--line);padding-top:10px;}
  .pdv-card-stats > div{display:flex;flex-direction:column;}
  .pdv-stat-val{font-family:var(--disp);font-weight:700;font-size:13px;}
  .pdv-stat-lab{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin-top:1px;}

  /* Paramètres — thèmes & logo */
  .theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .theme-swatch{border:2px solid var(--line);border-radius:8px;padding:10px;cursor:pointer;transition:.12s;}
  .theme-swatch:hover{border-color:var(--orange);}
  .theme-swatch.active{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,102,0,.15);}
  .theme-swatch-bar{height:34px;border-radius:5px;margin-bottom:8px;}
  .theme-swatch-name{font-size:12px;font-weight:600;text-align:center;}
  .logo-upload-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .logo-preview{width:72px;height:72px;border-radius:14px;object-fit:cover;border:1.5px solid var(--line);background:#FCFBFA;}
  .settings-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap;}

  /* Photo de profil */
  .photo-upload-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:4px;}
  .photo-preview{width:76px;height:76px;border-radius:50%;object-fit:cover;border:2px solid var(--line);background:#EFEBE4;}
  .avatar-sm{width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px;border:1px solid var(--line);background:#EFEBE4;}
  .name-cell{display:flex;align-items:center;}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">MO</div>
      <div class="brand-name" id="loginBrandName">Maison Orange</div>
    </div>
    <p class="brand-sub">Console de gestion de zone</p>
    <div class="login-err" id="loginErr"></div>
    <div class="field">
      <label>Code d'accès</label>
      <input type="text" id="loginCode" placeholder="ex : RZ-0001" autocomplete="off">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="text" id="loginPass" placeholder="Mot de passe" autocomplete="off">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Se connecter</button>
    <div class="login-hint">
      <b>Démo — comptes créés au premier lancement :</b><br>
      Responsable de zone : <b>RZ-0001</b> / orange2024<br>
      (Créez ensuite superviseurs, gérants et agents depuis le tableau de bord.)
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <aside>
    <div class="side-brand">
      <div class="brand-mark">MO</div>
      <div>
        <div class="side-brand-text" id="sideBrandText">Maison Orange</div>
        <div class="side-role" id="sideRoleLabel">—</div>
      </div>
    </div>
    <nav id="navMenu"></nav>
    <div class="side-user">
      <div class="side-user-name" id="sideUserName">—</div>
      <div class="side-user-code" id="sideUserCode">—</div>
      <button class="btn btn-ghost btn-sm side-logout" onclick="logout()">Déconnexion</button>
    </div>
  </aside>
  <main id="mainContent"></main>
</div>

<div class="toast" id="toast"></div>

<!-- Generic modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Titre</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<script>
/* =========================================================================
   MAISON ORANGE — MOTEUR DE DONNEES + LOGIQUE APPLICATIVE
   Rôles : responsable_zone > superviseur > gerant / agent
   ========================================================================= */

/* ---------- COMPATIBILITE HORS CLAUDE.AI ----------
   window.storage n'existe que dans l'environnement Claude.ai. Pour un
   déploiement autonome (GitHub Pages, Firebase Hosting, serveur classique),
   on simule la même API avec localStorage afin que l'application fonctionne
   à l'identique, avec sauvegarde persistante dans le navigateur. */
if(typeof window.storage === 'undefined'){
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem('mo_'+key);
      if(raw===null){ const err=new Error('Clé introuvable : '+key); throw err; }
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem('mo_'+key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem('mo_'+key);
      return { key, deleted:true, shared: !!shared };
    },
    async list(prefix, shared){
      const p = 'mo_'+(prefix||'');
      const keys = Object.keys(localStorage).filter(k=>k.startsWith(p)).map(k=>k.slice(3));
      return { keys, prefix, shared: !!shared };
    }
  };
}

const DB_KEY = 'maison_orange_db_v1';
let DB = null;
let SESSION = null; // {code, role, id}
let currentView = 'dashboard';

/* ---------- UTILITAIRES ---------- */
function uid(prefix){ return prefix + '-' + Math.random().toString(36).slice(2,7).toUpperCase(); }
function nowISO(){ return new Date().toISOString(); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function isToday(iso){ return iso && iso.slice(0,10) === todayStr(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('active'); setTimeout(()=>t.classList.remove('active'),2600); }
function genPass(){ const s='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let p=''; for(let i=0;i<6;i++) p+=s[Math.floor(Math.random()*s.length)]; return p; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- OBJECTIFS & GRAPHIQUES (CA / TDR / TDA / LP) ---------- */
const chartInstances = {};
function destroyChart(id){ if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } }
function drawChart(canvasId, type, labels, data, color, labelText){
  destroyChart(canvasId);
  const el = document.getElementById(canvasId);
  if(!el || typeof Chart==='undefined') return;
  chartInstances[canvasId] = new Chart(el, {
    type: type,
    data: { labels, datasets: [{ label: labelText, data, backgroundColor: type==='bar'? color+'CC' : color+'33', borderColor: color, borderWidth: 2, tension:.3, fill: type==='line', borderRadius: type==='bar'?4:0 }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },

function monthKey(dateStr){ return (dateStr||todayStr()).slice(0,7); }
function objKey(type, gerantId, ym){ return `${type}_${gerantId}_${ym}`; }
function getObjectif(type, gerantId, ym){ return Number(DB.objectifs[objKey(type,gerantId,ym)] || 0); }
function computeMonthTotal(type, gerantId, ym){
  return DB[type].filter(e=> e.gerantId===gerantId && monthKey(e.date)===ym).reduce((a,e)=>a+Number(e.montant||0),0);
}
function last14DaysSeries(type, gerantId, days){
  days = days || 14;
  const labels=[], data=[];
  for(let i=days-1;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    labels.push(d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}));
    const sum = DB[type].filter(e=> e.date===ds && (!gerantId || e.gerantId===gerantId)).reduce((a,e)=>a+Number(e.montant||0),0);
    data.push(sum);
  }
  return {labels, data};
}
function totalsByGerant(type, gerantIds, dateFilterFn){
  const labels=[], data=[];
  gerantIds.forEach(gid=>{
    const g = DB.users.find(u=>u.id===gid);
    if(!g) return;
    const sum = DB[type].filter(e=> e.gerantId===gid && (!dateFilterFn || dateFilterFn(e.date))).reduce((a,e)=>a+Number(e.montant||0),0);
    labels.push(g.prenom+' '+g.nom.charAt(0)+'.');
    data.push(sum);
  });
  return {labels, data};
}
function objectifProgressHtml(type, gerantId){
  const ym = todayStr().slice(0,7);
  const target = getObjectif(type, gerantId, ym);
  const actual = computeMonthTotal(type, gerantId, ym);
  if(!target) return `<div class="muted" style="font-size:12px;">Aucun objectif défini pour ${typeLabel(type)} ce mois-ci.</div>`;
  const pct = Math.min(100, Math.round((actual/target)*100));
  return `<div class="obj-row"><span>Objectif ${typeLabel(type)} — ${new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</span><b>${actual.toLocaleString('fr-FR')} / ${target.toLocaleString('fr-FR')} ${unitFor(type)}</b></div>
  <div class="progress-track"><div class="progress-fill ${pct>=100?'over':''}" style="width:${pct}%;"></div></div>`;
}
function openObjectifsModal(type){
  const scope = SESSION.role==='responsable_zone'
    ? DB.users.filter(u=>u.role==='gerant')

        <input type="number" id="obj_${g.id}" value="${getObjectif(type,g.id,ym)||''}" placeholder="Cible en ${unitFor(type)}">

  document.getElementById('modalFoot').innerHTML = scope.length===0 ? `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Fermer</button>` : `

    <button class="btn btn-primary btn-sm" onclick="saveObjectifs('${type}', ${JSON.stringify(scope.map(g=>g.id))})">Enregistrer</button>`;
  openModal();

async function saveObjectifs(type, gerantIds){
  const ym = todayStr().slice(0,7);
  gerantIds.forEach(gid=>{
    const val = document.getElementById('obj_'+gid).value;
    DB.objectifs[objKey(type,gid,ym)] = val ? Number(val) : 0;

/* ---------- SIGNATURE : ARC DE CYCLE JOURNALIER ----------
   Représente visuellement l'heure du jour restante avant le verrouillage
   de l'accès superviseur à minuit (00:00). Réapparaît partout où la règle
   "accès limité au jour courant" s'applique. */
function dayArcSVG(size){
  size = size || 40;
  const now = new Date();
  const pct = (now.getHours()*60+now.getMinutes())/1440; // fraction du jour écoulée
  const r = size/2 - 4;
  const c = size/2;
  const circumference = 2*Math.PI*r;
  const dash = circumference*pct;
  const remain = 24 - (now.getHours() + now.getMinutes()/60);
  const hRestantes = remain.toFixed(1);
  return `<div class="day-arc">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#F3DFC4" stroke-width="4"/>
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#FF6600" stroke-width="4"
        stroke-linecap="round" stroke-dasharray="${dash} ${circumference}"
        transform="rotate(-90 ${c} ${c})"/>
    </svg>
    <span class="day-arc-label">${hRestantes} h avant verrouillage</span>
  </div>`;
}

/* ---------- PERSISTENCE (localStorage-like via storage API, fallback to JS var if unavailable) ---------- */
async function loadDB(){
  try{
    const res = await window.storage.get('db', true);
    if(res && res.value){ DB = JSON.parse(res.value); if(!DB.objectifs) DB.objectifs={}; if(!DB.settings) DB.settings={logo:null,themeId:'orange',nomZone:'Maison Orange',adresse:'',contactTel:'',contactEmail:''}; if(!DB.settings.nomZone) DB.settings.nomZone='Maison Orange'; return; }
  }catch(e){ /* not found */ }
  DB = seedDB();
  await saveDB();
}
async function saveDB(){
  try{
    await window.storage.set('db', JSON.stringify(DB), true);
  }catch(e){ console.error('Erreur de sauvegarde', e); toast('Erreur de sauvegarde des données'); }
}

function findUser(code, pass){
  return DB.users.find(u => u.code.toLowerCase() === code.trim().toLowerCase() && u.pass === pass && u.active);
}

async function doLogin(){
  const code = document.getElementById('loginCode').value;
  const pass = document.getElementById('loginPass').value;
  const errBox = document.getElementById('loginErr');
  const u = findUser(code, pass);
  if(!u){
    errBox.style.display='block';
    errBox.textContent = 'Code d\'accès ou mot de passe invalide.';
    return;
  }
  errBox.style.display='none';
  SESSION = u;
  u.lastLogin = nowISO();
  logAction('Connexion', `${u.role} connecté`);
  await saveDB();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('active');

}

      ['TDA aujourd\'hui', DB.tda.filter(t=>t.gerantId===SESSION.id && isToday(t.date)).length, ''],
      ['LP aujourd\'hui', DB.lp.filter(t=>t.gerantId===SESSION.id && isToday(t.date)).length, ''],
    ]);
  } else if(role==='agent'){
    const mySims = DB.sims.filter(s=>s.agentId===SESSION.id);
    statsHtml = cardsRow([
      ['SIM en charge', mySims.filter(s=>s.statut==='attribuee').length, ''],
      ['Historique total', mySims.length, 'SIM traitées'],
    ]);
  }

  main.innerHTML = `
    <div class="topbar">
      <div><h1>Tableau de bord</h1><p>Bienvenue, ${escapeHtml(SESSION.prenom)} ${escapeHtml(SESSION.nom)} — ${roleLabel(role)}</p></div>
    </div>
    ${lockBanner}
    ${statsHtml}
    ${extraHtml}
    <div class="panel">
      <div class="panel-head"><h2>Activité récente</h2></div>
      <div class="panel-body">${recentActivityTable()}</div>
    </div>
  `;
  afterRender();
}

function cardsRow(items){
  return `<div class="grid-cards">${items.map(([label,val,sub])=>`
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${val}</div>
      ${sub?`<div class="stat-sub">${sub}</div>`:''}
    </div>`).join('')}</div>`;
}

function recentActivityTable(){
  let logs = [...DB.activityLog].sort((a,b)=> new Date(b.ts)-new Date(a.ts));
  if(SESSION.role==='superviseur'){
    // superviseur : uniquement logs du jour, de son équipe + lui-même
    const teamIds = DB.users.filter(u=>u.superviseurId===SESSION.id || u.createdBy===SESSION.id).map(u=>u.id).concat([SESSION.id]);
    logs = logs.filter(l=> isToday(l.ts) && teamIds.includes(l.userId));
  } else if(SESSION.role==='gerant' || SESSION.role==='agent'){
    logs = logs.filter(l=> l.userId===SESSION.id);
  }
  logs = logs.slice(0,12);
  if(logs.length===0) return emptyState('Aucune activité','Les actions effectuées apparaîtront ici.');
  return `<table><thead><tr><th>Date</th><th>Utilisateur</th><th>Rôle</th><th>Action</th><th>Détail</th></tr></thead><tbody>
    ${logs.map(l=>`<tr><td class="mono">${fmtDate(l.ts)}</td><td>${escapeHtml(l.userNom)}</td><td><span class="badge badge-orange">${roleLabel(l.role)}</span></td><td>${escapeHtml(l.action)}</td><td class="muted">${escapeHtml(l.details)}</td></tr>`).join('')}
  </tbody></table>`;
}

function emptyState(title,sub){
  return `<div class="empty"><b>${title}</b>${sub}</div>`;
}

/* ---------- ORGANIGRAMME : RZ > Superviseur > Gérants / Agents ---------- */
function organigrammeView(){
  const rz = DB.users.find(u=>u.role==='responsable_zone');
  const supers = DB.users.filter(u=>u.role==='superviseur');
  const orphanAgents = DB.users.filter(u=>u.role==='agent' && !u.superviseurId);

  const branch = (sup)=>{
    const myGerants = DB.users.filter(u=>u.role==='gerant' && u.superviseurId===sup.id);
    const myAgents = DB.users.filter(u=>u.role==='agent' && u.superviseurId===sup.id);
    return `<div class="org-node org-sup">
      <div class="org-card" onclick="openUserProfile('${sup.id}')">
        <div class="org-name">${escapeHtml(sup.prenom)} ${escapeHtml(sup.nom)}</div>
        <div class="org-role">Superviseur — ${sup.code}</div>
        ${!sup.active?'<span class="badge badge-danger">Suspendu</span>':''}
      </div>
      <div class="org-children">
        ${myGerants.map(g=>`<div class="org-card org-leaf" onclick="openUserProfile('${g.id}')">
          <div class="org-name">${escapeHtml(g.prenom)} ${escapeHtml(g.nom)}</div>
          <div class="org-role">Gérant — ${g.code}</div>
        </div>`).join('')}
        ${myAgents.map(a=>`<div class="org-card org-leaf org-agent" onclick="openUserProfile('${a.id}')">
          <div class="org-name">${escapeHtml(a.prenom)} ${escapeHtml(a.nom)}</div>
          <div class="org-role">Agent — ${a.code}</div>
        </div>`).join('')}
        ${(myGerants.length+myAgents.length)===0?'<div class="org-empty">Aucune équipe créée</div>':''}
      </div>
    </div>`;
  };

  return `
    <div class="panel"><div class="panel-body">
      <div class="org-chart">
        <div class="org-card org-root">
          <div class="org-name">${escapeHtml(rz.prenom)} ${escapeHtml(rz.nom)}</div>
          <div class="org-role">Responsable de zone — ${rz.code}</div>
        </div>
        <div class="org-branches">
          ${supers.map(branch).join('')}
          ${orphanAgents.length ? `<div class="org-node org-sup">
            <div class="org-card"><div class="org-name">Agents rattachés directement</div><div class="org-role">${orphanAgents.length} agent(s)</div></div>
            <div class="org-children">${orphanAgents.map(a=>`<div class="org-card org-leaf org-agent" onclick="openUserProfile('${a.id}')">
              <div class="org-name">${escapeHtml(a.prenom)} ${escapeHtml(a.nom)}</div><div class="org-role">Agent — ${a.code}</div>
            </div>`).join('')}</div>
          </div>` : ''}
          ${supers.length===0 && orphanAgents.length===0 ? '<div class="org-empty">Aucun superviseur créé pour le moment.</div>' : ''}
        </div>
      </div>
    </div></div>
  `;
}

function defaultAvatar(){
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80"><rect width="80" height="80" fill="#EFEBE4"/><circle cx="40" cy="30" r="14" fill="#C7C0B4"/><ellipse cx="40" cy="66" rx="24" ry="16" fill="#C7C0B4"/></svg>`);
}
function handlePhotoSelect(input, previewId){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById(previewId).src = e.target.result; };
  reader.readAsDataURL(file);
}

function nextCode(prefix){
  const existing = DB.users.filter(u=>u.code.startsWith(prefix+'-')).map(u=>parseInt(u.code.split('-')[1])||0);
  const n = (existing.length? Math.max(...existing):0)+1;
  return prefix+'-'+String(n).padStart(4,'0');
}

async function saveNewUser(role){
  const prenom = document.getElementById('nu_prenom').value.trim();
  const nom = document.getElementById('nu_nom').value.trim();
  const tel = document.getElementById('nu_tel').value.trim();
  const code = document.getElementById('nu_code').value.trim();
  const pass = document.getElementById('nu_pass').value.trim();
  const modif = document.getElementById('nu_modif').checked;
  const suppr = document.getElementById('nu_suppr').checked;
  const pdvId = role==='gerant' ? document.getElementById('nu_pdv')?.value : null;
  const superviseurId = role==='agent' ? document.getElementById('nu_superviseur')?.value
    : role==='gerant' ? (SESSION.role==='superviseur' ? SESSION.id : document.getElementById('nu_superviseur_g')?.value)
    : null;
  const photoEl = document.getElementById('nu_photo_preview');
  const photo = photoEl && photoEl.src.startsWith('data:image') && !photoEl.src.includes('svg+xml') ? photoEl.src : null;

  if(!prenom || !nom || !code || !pass){ toast('Veuillez remplir tous les champs obligatoires'); return; }
  if(DB.users.some(u=>u.code.toLowerCase()===code.toLowerCase())){ toast('Ce code existe déjà'); return; }

  const newUser = {
    id: uid(role.substring(0,2).toUpperCase()),
    role, code, pass, nom, prenom, tel, photo,
    pdvId: pdvId || null,
    superviseurId: superviseurId || null,
    createdAt: nowISO(), createdBy: SESSION.id, active:true,
    perms:{modifier:modif, supprimer:suppr}
  };
  DB.users.push(newUser);
  logAction('Création de compte', `${roleLabel(role)} ${prenom} ${nom} (${code}) créé`);
  await saveDB();
  closeModal();
  toast(`Compte créé : ${code} / ${pass}`);
  render();
}

async function saveEditUser(id){
  const u = DB.users.find(x=>x.id===id);
  if(!u) return;
  const newCode = document.getElementById('eu_code').value.trim();
  if(DB.users.some(x=>x.id!==id && x.code.toLowerCase()===newCode.toLowerCase())){ toast('Ce code est déjà utilisé'); return; }
  u.prenom = document.getElementById('eu_prenom').value.trim();
  u.nom = document.getElementById('eu_nom').value.trim();
  u.tel = document.getElementById('eu_tel').value.trim();
  u.code = newCode;
  u.pass = document.getElementById('eu_pass').value.trim();
  const photoEl = document.getElementById('eu_photo_preview');
  if(photoEl) u.photo = photoEl.src.startsWith('data:image') && !photoEl.src.includes('svg+xml') ? photoEl.src : u.photo;

  await saveDB();
  closeModal();
  toast('Compte mis à jour');
  render();
}

async function savePermUser(id){
  const u = DB.users.find(x=>x.id===id);
  const newModif = document.getElementById('pu_modif').checked;
  const newSuppr = document.getElementById('pu_suppr').checked;
  if(!u.permsHistory) u.permsHistory = [];
  if(newModif!==u.perms.modifier || newSuppr!==u.perms.supprimer){
    u.permsHistory.push({
      ts: nowISO(), by: SESSION.prenom+' '+SESSION.nom,
      before: {modifier:u.perms.modifier, supprimer:u.perms.supprimer},
      after: {modifier:newModif, supprimer:newSuppr}
    });
  }
  u.perms.modifier = newModif;
  u.perms.supprimer = newSuppr;
  logAction('Autorisations modifiées', `${u.code} : modif=${u.perms.modifier}, suppr=${u.perms.supprimer}`);
  await saveDB();
  closeModal();
  toast('Autorisations mises à jour');
  render();
}

function accessTable(list){

  return `<table><thead><tr><th>Code</th><th>Nom</th><th>Rôle</th><th>Mot de passe</th><th>Statut</th><th>Créé le</th></tr></thead><tbody>

}
function exportAccessExcel(){
  const rows = [['Code','Prénom','Nom','Rôle','Mot de passe','Statut','Créé le']];
  DB.users.forEach(u=> rows.push([u.code, u.prenom, u.nom, roleLabel(u.role), u.pass, u.active?'Actif':'Suspendu', fmtDate(u.createdAt)]));
  exportToExcel(rows, 'codes-acces-maison-orange', 'Codes acces');
}
function filterAccessTable(q){
  q = q.toLowerCase();
  const list = DB.users.filter(u=> u.code.toLowerCase().includes(q) || (u.prenom+' '+u.nom).toLowerCase().includes(q));
  document.getElementById('accessTableWrap').innerHTML = accessTable(list);

function pdvGrid(list){
  if(list.length===0) return emptyState('Aucun point de vente','Créez votre premier PDV, ou ajustez votre recherche.');
  return `<div class="pdv-grid">${list.map(p=>{
    const gerant = DB.users.find(u=>u.id===p.gerantId);
    const simCount = DB.sims.filter(s=>s.pdvId===p.id).length;
    const caTotal = gerant ? DB.ca.filter(c=>c.gerantId===gerant.id).reduce((a,c)=>a+Number(c.montant||0),0) : 0;
    return `<div class="pdv-card" onclick="openPDVProfile('${p.id}')">
      <div class="pdv-card-head">
        <div class="pdv-card-name">${escapeHtml(p.nom)}</div>
        ${gerant? '<span class="badge badge-ok">Actif</span>' : '<span class="badge badge-locked">Non assigné</span>'}
      </div>
      <div class="pdv-card-lieu">📍 ${escapeHtml(p.lieu||'Localisation non renseignée')}</div>
      <div class="pdv-card-stats">
        <div><span class="pdv-stat-val">${gerant? gerant.prenom+' '+gerant.nom.charAt(0)+'.' : '—'}</span><span class="pdv-stat-lab">Gérant</span></div>
        <div><span class="pdv-stat-val">${simCount}</span><span class="pdv-stat-lab">SIM</span></div>
        <div><span class="pdv-stat-val">${caTotal.toLocaleString('fr-FR')}</span><span class="pdv-stat-lab">GNF cumulés</span></div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function filterPdvGrid(){
  const q = document.getElementById('pdvSearch').value.toLowerCase();
  const list = DB.pdvs.filter(p=>{
    const gerant = DB.users.find(u=>u.id===p.gerantId);
    const hay = [p.nom, p.lieu, gerant?gerant.prenom+' '+gerant.nom:''].join(' ').toLowerCase();
    return hay.includes(q);
  });
  document.getElementById('pdvGridWrap').innerHTML = pdvGrid(list);
}

/* ---------- ALERTES SIM ----------
   - Stock dormant : SIM en stock depuis plus de 15 jours sans attribution
   - Mouvements suspects : SIM ayant subi 3 retraits ou plus (rotation anormale) */
function simAlerts(){
  const alerts = [];
  const now = new Date();
  DB.sims.forEach(s=>{
    if(s.statut==='stock'){
      const lastEvent = s.history[s.history.length-1];
      const days = lastEvent ? Math.floor((now - new Date(lastEvent.ts))/86400000) : 0;
      if(days >= 15) alerts.push({sim:s, type:'dormant', detail:`En stock depuis ${days} jours sans attribution`});
    }
    const retraits = s.history.filter(h=>h.event==='Retrait').length;
    if(retraits >= 3) alerts.push({sim:s, type:'rotation', detail:`${retraits} retraits enregistrés — rotation anormale`});
  });
  return alerts;
}

function filterSimsTable(){
  const q = (document.getElementById('simSearch')?.value || '').toLowerCase();
  const statusF = document.getElementById('simStatusFilter')?.value || '';
  const pdvF = document.getElementById('simPdvFilter')?.value || '';
  let list = DB.sims;
  if(SESSION.role==='agent') list = list.filter(s=>s.agentId===SESSION.id);
  list = list.filter(s=>{
    const agent = DB.users.find(u=>u.id===s.agentId);
    const hay = [s.iccid, s.clientNomActuel, s.clientTelActuel, agent?agent.prenom+' '+agent.nom:''].join(' ').toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(statusF && s.statut!==statusF) return false;
    if(pdvF && s.pdvId!==pdvF) return false;
    return true;
  });
  document.getElementById('simsTableWrap').innerHTML = simsTable(list);
}

    const agent = DB.users.find(u=>u.id===s.agentId);

  const arrow = diff>=0 ? '▲' : '▼';
  return `<span class="${cls}">${arrow} ${Math.abs(pct)}%</span>`;

/* ---------- RAPPORTS : calcul par période réelle ---------- */
function periodDateRange(periode){
  if(periode.startsWith('Y-')){
    const year = periode.split('-')[1];
    return { start:`${year}-01-01`, end:`${year}-12-31` };
  }
  const [q, year] = periode.split('-');
  const qn = Number(q.replace('Q',''));
  const startMonth = (qn-1)*3+1;
  const endMonth = startMonth+2;
  const lastDay = new Date(Number(year), endMonth, 0).getDate();
  return {
    start: `${year}-${String(startMonth).padStart(2,'0')}-01`,
    end: `${year}-${String(endMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`
  };
}
function computeStatsForPeriod(periode){
  const {start,end} = periodDateRange(periode);
  const inRange = d => d>=start && d<=end;
  return {
    caTotal: DB.ca.filter(e=>inRange(e.date)).reduce((a,e)=>a+Number(e.montant||0),0),
    tdrTotal: DB.tdr.filter(e=>inRange(e.date)).length,
    tdaTotal: DB.tda.filter(e=>inRange(e.date)).length,
    lpTotal: DB.lp.filter(e=>inRange(e.date)).reduce((a,e)=>a+Number(e.montant||0),0),
    simsTotal: DB.sims.filter(s=>s.statut==='attribuee').length,
    superviseurs: DB.users.filter(u=>u.role==='superviseur').length,
    gerants: DB.users.filter(u=>u.role==='gerant').length,
    agents: DB.users.filter(u=>u.role==='agent').length,
    pdvs: DB.pdvs.length
  };
}
function periodeLabel(periode){
  if(periode.startsWith('Y-')) return 'Année '+periode.split('-')[1];
  const [q,y] = periode.split('-');
  return 'T'+q.replace('Q','')+' '+y;
}

function buildPrintableClone(){
  const source = document.getElementById('mainContent');
  const clone = source.cloneNode(true);
  const liveCanvases = source.querySelectorAll('canvas');
  const cloneCanvases = clone.querySelectorAll('canvas');
  cloneCanvases.forEach((c,i)=>{
    const live = liveCanvases[i];
    const img = document.createElement('img');
    img.style.width='100%'; img.style.maxWidth='680px'; img.style.display='block'; img.style.margin='0 auto';
    if(live){ try{ img.src = live.toDataURL('image/png'); }catch(e){} }
    c.replaceWith(img);
  });
  clone.querySelectorAll('button, input, select, textarea').forEach(el=>el.remove());
  return clone;
}

    .footer-note{ margin-top:24px; padding-top:10px; border-top:1px solid #E7E3DD; font-size:9px; color:#999; }
  </style></head><body>

  <div class="footer-note">Document généré automatiquement par la console de gestion Maison Orange, à des fins de suivi et de justification.</div>

  </body></html>`;

}

async function exportCurrentPageJPEG(){
  if(typeof html2canvas==='undefined'){ toast('Bibliothèque de capture indisponible'); return; }
  const target = document.getElementById('mainContent');
  const hidden = Array.from(target.querySelectorAll('button, input, select, textarea'));
  hidden.forEach(el=> el.style.visibility='hidden');
  toast('Génération de l\'image…');
  try{
    const canvas = await html2canvas(target, { backgroundColor:'#F7F5F2', scale:2, useCORS:true });
    const link = document.createElement('a');
    link.download = `maison-orange-${currentView}-${todayStr()}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
    toast('Image JPEG téléchargée');
  }catch(e){
    console.error(e); toast('Erreur lors de la génération de l\'image');
  }finally{
    hidden.forEach(el=> el.style.visibility='');
  }
}
